<?xml version="1.0" encoding="UTF-8"?>
<!-- DogShift mark — purple square with a white paw. Used as the in-app logo
     (onboarding slide 1, login screen, app icon variants) so the brand stays
     coherent with the iOS / Android app icon. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="DogShift">
  <rect width="256" height="256" rx="56" fill="#7c3aed"/>
  <g fill="#ffffff">
    <!-- Toes (4 ovals around the top) -->
    <ellipse cx="80" cy="100" rx="22" ry="28"/>
    <ellipse cx="124" cy="86"  rx="20" ry="26"/>
    <ellipse cx="168" cy="100" rx="22" ry="28"/>
    <ellipse cx="200" cy="138" rx="18" ry="22"/>
    <ellipse cx="56"  cy="138" rx="18" ry="22"/>
    <!-- Main pad -->
    <path d="M128 142
             c -32 0 -56 26 -56 52
             c 0 22 18 38 56 38
             c 38 0 56 -16 56 -38
             c 0 -26 -24 -52 -56 -52 z"/>
  </g>
</svg>
