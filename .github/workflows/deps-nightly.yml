name: Deps Agent (nightly)

on:
  schedule:
    # Every day at 00:30 UTC
    - cron: "30 0 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — analyse only, no PRs"
        required: false
        default: "false"

jobs:
  deps:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    defaults:
      run:
        working-directory: dogshift

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dogshift/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Configure git
        run: |
          git config user.name "DogShift Deps Bot"
          git config user.email "deps-bot@dogshift.ch"
          git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Run Deps Agent
        run: node --experimental-strip-types scripts/deps-agent.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MAINTENANCE_API_KEY: ${{ secrets.MAINTENANCE_API_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
