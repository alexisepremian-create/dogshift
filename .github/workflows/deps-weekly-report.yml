name: Deps Agent (weekly deep scan)

on:
  schedule:
    # Every Monday at 07:00 UTC
    - cron: "0 7 * * 1"
  workflow_dispatch: {}

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    defaults:
      run:
        working-directory: dogshift

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dogshift/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Run weekly deep scan
        run: node --experimental-strip-types scripts/deps-weekly-report.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN_MAINTENANCE: ${{ secrets.TELEGRAM_BOT_TOKEN_MAINTENANCE }}
          TELEGRAM_CHAT_ID_MAINTENANCE: ${{ secrets.TELEGRAM_CHAT_ID_MAINTENANCE }}
          # Legacy fallbacks (kept for safety — script prefers _MAINTENANCE above)
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MAINTENANCE_API_KEY: ${{ secrets.MAINTENANCE_API_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
