version: 2
updates:
  # npm dependencies for the dogshift app
  - package-ecosystem: "npm"
    directory: "/dogshift"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Zurich"
    open-pull-requests-limit: 5
    # Group minor and patch updates to reduce noise
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # ── Block ALL major bumps platform-wide ──────────────────────────────
      # Pattern observed every Monday : Dependabot opens 3-5 PRs for major
      # bumps (Stripe v22, Capacitor v8, lucide-react v1, nodemailer v8,
      # typescript v6, prisma v7…). They consistently fail CI because of
      # breaking changes, and the founder closes them by hand. Same waste
      # every week. Majors are now opt-in : when we actually want one, we
      # run `npm install <pkg>@latest` manually and ship the migration in
      # a deliberate PR.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # next-auth patches are noise (the v5 betas churn frequently and we
      # validate auth changes manually anyway).
      - dependency-name: "next-auth"
        update-types: ["version-update:semver-patch"]
    labels:
      - "dependencies"
      - "security"
